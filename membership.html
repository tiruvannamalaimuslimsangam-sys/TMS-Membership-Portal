<!DOCTYPE html>
<html lang="ta">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TMS உறுப்பினர் பதிவு</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<img src="images_logo.png (1).jpg" class="logo">

<h2>திருவண்ணாமலை முஸ்லிம் சங்கம்</h2>

<h3>உறுப்பினர் பதிவு</h3>

<form id="memberForm">

<label>உறுப்பினர் புகைப்படம்</label>

<input
type="file"
id="photo"
accept="image/*"
required>

<div class="photo-preview">

<img
id="preview"
src="images/user.png"
alt="Preview">

</div>

<label>முழு பெயர்</label>

<input
type="text"
id="name"
required>

<label>பிறந்த தேதி</label>

<input
type="date"
id="dob"
required>

<label>மொபைல் எண்</label>

<input
type="tel"
id="mobile"
required>

<label>முகவரி</label>

<textarea
id="address"
rows="3"
required></textarea>

<label>பதவி (இருந்தால் மட்டும்)</label>

<input
type="text"
id="designation">

<button
type="submit"
class="submit-btn">

உறுப்பினர் பதிவு செய்

</button>

</form>

</div>

<script>

const photo=document.getElementById("photo");

const preview=document.getElementById("preview");

photo.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

preview.src=e.target.result;

}

reader.readAsDataURL(file);

}

});

</script>

<script type="module" src="register.js"></script>

</body>
</html>
