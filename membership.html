<!DOCTYPE html>
<html lang="ta">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TMS உறுப்பினர் பதிவு</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<div class="card">

<img src="images_logo.png (1).jpg" class="logo" alt="TMS Logo">

<h1>திருவண்ணாமலை முஸ்லிம் சங்கம்</h1>

<h2>உறுப்பினர் பதிவு</h2>

<p class="subtitle">TMS Membership Registration</p>

<form id="memberForm">

<div class="photo-area">

<label for="photo">உறுப்பினர் புகைப்படம்</label>

<input
type="file"
id="photo"
accept="image/*"
required>

<img
id="preview"
src="images/user.png"
alt="Preview"
class="preview">

</div>

<div class="input-group">

<label>முழு பெயர்</label>

<input
type="text"
id="name"
placeholder="முழு பெயர்"
required>

</div>

<div class="input-group">

<label>பிறந்த தேதி</label>

<input
type="date"
id="dob"
required>

</div>

<div class="input-group">

<label>மொபைல் எண்</label>

<input
type="tel"
id="mobile"
placeholder="9876543210"
required>

</div>

<div class="input-group">

<label>முகவரி</label>

<textarea
id="address"
rows="3"
placeholder="முகவரி"
required></textarea>

</div>

<div class="input-group">

<label>பதவி (இருந்தால் மட்டும்)</label>

<input
type="text"
id="designation"
placeholder="உதா: தலைவர்">

</div>

<button
type="submit"
class="submit-btn">

📋 உறுப்பினர் பதிவு செய்

</button>

</form>

</div>

</div>

<script>

const photo=document.getElementById("photo");
const preview=document.getElementById("preview");

photo.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

preview.src=e.target.result;

}

reader.readAsDataURL(file);

}

});

</script>

<script type="module" src="register.js"></script>

</body>

</html>
