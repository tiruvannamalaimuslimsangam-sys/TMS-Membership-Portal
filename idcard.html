<!DOCTYPE html>
<html lang="ta">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TMS உறுப்பினர் அடையாள அட்டை</title>

<link rel="stylesheet" href="css/idcard.css">

</head>

<body>

<div class="id-card">

    <!-- Header -->

    <div class="card-header">

        <!-- Logo -->

        <div class="header-logo">

            <img src="images_logo.png (1).jpg"
            alt="Logo"
            class="logo">

        </div>

        <!-- Title -->

        <div class="header-title">

            <h2>திருவண்ணாமலை முஸ்லிம் சங்கம்</h2>

            <h3>TMS</h3>

            <p>உறுப்பினர் அடையாள அட்டை</p>

        </div>

        <!-- Flag -->

        <div class="header-flag">

            <img src="images_flag.png.jpg"
            alt="Flag"
            class="flag">

        </div>

    </div>

    <!-- Body -->

    <div class="card-body">

        <!-- Member Photo -->

        <div class="photo-box">

            <img
            id="memberPhoto"
            src="images/user.png"
            alt="Member Photo">

        </div>

        <!-- Member Details -->

        <div class="details">

            <table>

                <tr>

                    <td><b>உறுப்பினர் எண்</b></td>

                    <td>:</td>

                    <td id="memberNo"></td>

                </tr>

                <tr>

                    <td><b>பெயர்</b></td>

                    <td>:</td>

                    <td id="memberName"></td>

                </tr>

                <tr>

                    <td><b>மொபைல்</b></td>

                    <td>:</td>

                    <td id="memberMobile"></td>

                </tr>

                <tr>

                    <td><b>முகவரி</b></td>

                    <td>:</td>

                    <td id="memberAddress"></td>

                </tr>

                <tr id="designationBox">

                    <td><b>பதவி</b></td>

                    <td>:</td>

                    <td id="memberDesignation"></td>

                </tr>

            </table>

        </div>

    </div>
        <!-- ===== Signatures ===== -->

    <div class="signature-section">

        <div class="signature-box">

            <img
                src="images_president-sign.png.jpg"
                class="sign"
                alt="President Signature">

            <p>
                <strong>தலைவர்</strong><br>
                திருவண்ணாமலை முஸ்லிம் சங்கம் (TMS)
            </p>

        </div>

        <div class="signature-box">

            <img
                src="images_secretary-sign.png.jpg"
                class="sign"
                alt="Secretary Signature">

            <p>
                <strong>பொதுச் செயலாளர்</strong><br>
                திருவண்ணாமலை முஸ்லிம் சங்கம் (TMS)
            </p>

        </div>

    </div>

</div>

<div class="print-area">

    <button onclick="window.print()">
        🖨️ உறுப்பினர் அட்டையை அச்சிடு
    </button>

</div>

<script type="module" src="idcard.js"></script>

</body>

</html>
