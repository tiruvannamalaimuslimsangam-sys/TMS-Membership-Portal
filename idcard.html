
<!DOCTYPE html>
<html lang="ta">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TMS உறுப்பினர் அடையாள அட்டை</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="id-card">

<!-- Logo -->

<div class="logo-area">

<img src="images_logo.png (1).jpg"
class="logo"
alt="TMS Logo">

</div>

<!-- சங்கம் -->

<h3 style="text-align:center;">
திருவண்ணாமலை முஸ்லிம் சங்கம்
</h3>

<!-- Flag -->

<img
src="images_flag.png.jpg"
class="flag"
alt="TMS Flag">

<!-- Member Photo -->

<div class="photo-box">

<img
id="memberPhoto"
src="images/user.png"
alt="Member Photo">

</div>

<!-- Details -->

<div class="details">

<p>
<b>உறுப்பினர் எண் :</b>
<span id="memberNo"></span>
</p>

<p>
<b>பெயர் :</b>
<span id="memberName"></span>
</p>

<p>
<b>மொபைல் :</b>
<span id="memberMobile"></span>
</p>

<p>
<b>முகவரி :</b>
<span id="memberAddress"></span>
</p>

<p id="designationBox">

<b>பதவி :</b>

<span id="memberDesignation"></span>

</p>

</div>

<!-- Signatures -->

<div class="signature-section">

<div>

<img
src="images_president-sign.png.jpg"
class="sign"
alt="President Signature">

<p>

<b>தலைவர்</b><br>

திருவண்ணாமலை முஸ்லிம் சங்கம்

</p>

</div>

<div>

<img
src="images_secretary-sign.png.jpg"
class="sign"
alt="Secretary Signature">

<p>

<b>பொதுச் செயலாளர்</b><br>

திருவண்ணாமலை முஸ்லிம் சங்கம்

</p>

</div>

</div>

<br>

<button onclick="window.print()">

🖨️ Print ID Card

</button>

</div>

<script type="module" src="idcard.js"></script>

</body>
</html>
