<!DOCTYPE html>
<html lang="ta">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TMS உறுப்பினர் அடையாள அட்டை</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/idcard.css">

</head>

<body>

<div class="id-card">

    <!-- Header -->
    <div class="card-header">

        <div class="header-logo">
            <img src="images_logo.png (1).jpg"
                 class="logo"
                 alt="TMS Logo">
        </div>

        <div class="header-title">

            <h2>திருவண்ணாமலை முஸ்லிம் சங்கம்</h2>

            <h3>TMS</h3>

            <p>உறுப்பினர் அடையாள அட்டை</p>

        </div>

        <div class="header-flag">
            <img src="images_flag.png.jpg"
                 class="flag"
                 alt="TMS Flag">
        </div>

    </div>

    <!-- Card Body -->

    <div class="card-body">

        <!-- Photo -->

        <div class="photo-box">

            <img id="memberPhoto"
                 src="images/user.png"
                 alt="Member Photo">

        </div>

        <!-- Details -->

        <div class="details">

            <table>

                <tr>
                    <td>உறுப்பினர் எண்</td>
                    <td>:</td>
                    <td><span id="memberNo"></span></td>
                </tr>

                <tr>
                    <td>பெயர்</td>
                    <td>:</td>
                    <td><span id="memberName"></span></td>
                </tr>

                <tr>
                    <td>மொபைல்</td>
                    <td>:</td>
                    <td><span id="memberMobile"></span></td>
                </tr>

                <tr>
                    <td>முகவரி</td>
                    <td>:</td>
                    <td><span id="memberAddress"></span></td>
                </tr>

                <tr id="designationBox">
                    <td>பதவி</td>
                    <td>:</td>
                    <td><span id="memberDesignation"></span></td>
                </tr>

            </table>

        </div>

    </div>

    <!-- Signature -->

    <div class="signature-section">

        <div class="signature-box">

            <img src="images_president-sign.png.jpg"
                 class="sign"
                 alt="President Signature">

            <p>
                <strong>தலைவர்</strong><br>
                திருவண்ணாமலை முஸ்லிம் சங்கம் (TMS)
            </p>

        </div>

        <div class="signature-box">

            <img src="images_secretary-sign.png.jpg"
                 class="sign"
                 alt="Secretary Signature">

            <p>
                <strong>பொதுச் செயலாளர்</strong><br>
                திருவண்ணாமலை முஸ்லிம் சங்கம் (TMS)
            </p>

        </div>

    </div>

</div>

<div class="print-area">

    <button onclick="window.print()">
        🖨️ உறுப்பினர் அட்டையை அச்சிடு
    </button>

</div>

<script type="module" src="idcard.js"></script>

</body>
</html>
